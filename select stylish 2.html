<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Stylist</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #1b0f16;
            font-family: Epilogue;
            padding: 20px;
            color: white;
        }

        /* NAVBAR WRAPPER */
        .nav-wrapper {
            max-width: 1600px;
            margin: 20px auto;
            background: #2b1720;
            border: 2px solid #E8306E;
            border-radius: 15px;
            padding: 10px 20px;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        /* LOGO */
        .logo {
            color: #ff2f7a;
            font-weight: bold;
            font-size: 1.8rem;
        }

        /* MENU LINKS */
        .menu {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: xx-large;
        }



        /* HAMBURGER */
        .hamburger {
            display: none;
            font-size: 32px;
            cursor: pointer;
            color: white;
        }

        #menu-toggle {
            display: none;
        }

        /* MOBILE MENU */
        @media (max-width: 768px) {

            .menu {
                display: none;
                flex-direction: column;
                background: #2b1720;
                position: absolute;
                top: 90px;
                right: 20px;
                padding: 20px;
                border-radius: 10px;
                border: 2px solid #E8306E;
                gap: 20px;
            }

            #menu-toggle:checked~.menu {
                display: flex;
            }

            .hamburger {
                display: block;
            }
        }

        .container {
            max-width: 1000px;
            margin: auto;
            text-align: left;
        }

        .sub {
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .stylist-card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info {
            flex: 1;
        }

        .stylist-img {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            object-fit: cover;
        }

        .select-btn {
            background: #E8306E;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;

        }

        .continue-btn {
            background: #ff2f7a;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;

        }

        .btn-right {
            text-align: right;
        }


        /* MEDIA QUERY */
        @media (max-width: 768px) {

            .stylist-card {
                flex-direction: column;
                text-align: center;
            }

            .stylist-img {
                width: 150px;
                height: 150px;
            }
        }

        /* highlight */
        .highlight {
            border: 3px solid #ff2f7a;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 0 15px #ff2f7a;
        }

        /* pagination*/
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 40px;

        }

        .arrow-btn {
            background: black;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .arrow-btn:hover {
            background: #333;
        }

        /* MOBILE VIEW */
        @media (max-width: 768px) {
            .pagination {
                justify-content: center;
                gap: 40px;
            }

            .arrow-btn {
                padding: 10px 18px;
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="nav-wrapper">
        <div class="navbar">

            <div class="logo" id="navLogo">💇 Luxe Salon</div>

            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="hamburger">☰</label>

            <div class="menu">
                <a href="index1.html">Home</a>
                <a href="services.html">Services</a>
                <a href="joinmembership2.html">Membership</a>

            </div>

            <img src="navlogo.jpg" width="200" alt="description" id="navImg">

        </div>
    </div>

    <script>
        function highlightNavbar() {
            // turn ON highlight
            document.getElementById("navLogo").classList.add("highlight");
            document.getElementById("navImg").classList.add("highlight");

            // turn OFF highlight after 2 seconds
            setTimeout(() => {
                document.getElementById("navLogo").classList.remove("highlight");
                document.getElementById("navImg").classList.remove("highlight");
            }, 2000); // 2000ms = 2 seconds
        }
    </script>






    <div class="container">

        <h1>Select a Stylist</h1>
        <p class="sub">Choose a stylist that best fits your needs.</p>

        <div class="stylist-card">


            <div class="info">
                <h2>Olivia Carter</h2>
                <p>Specialty: Hair Styling</p>
                <button class="select-btn" onclick="highlightNavbar()">Select</button>

            </div>
            <img src="style1.jpg" class="stylist-img">
        </div>
        <div class="stylist-card">


            <div class="info">
                <h2>Olivia Carter</h2>
                <p>Specialty: Hair Styling</p>
                <button class="select-btn" onclick="highlightNavbar()">Select</button>

            </div>
            <img src="style2.jpg" class="stylist-img">

        </div>
        <div class="stylist-card">


            <div class="info">
                <h2>Olivia Carter</h2>
                <p>Specialty: Hair Styling</p>
                <button class="select-btn" onclick="highlightNavbar()">Select</button>

            </div>
            <img src="style3.jpg" class="stylist-img">
        </div>
        <div class="btn-right">
            <button class="continue-btn" onclick="goToPayment()">Continue with Selected Stylist</button>
        </div>


    </div>

    <script>
        function goToPayment() {
            window.location.href = "proceed3.html";
        }
    </script>
    <div class="pagination">
        <div class="pagination">
            <button class="arrow-btn" onclick="goHome()">◀</button>
            <button class="arrow-btn" onclick="goPayment()">▶</button>
        </div>

        <script>
            function goHome() {
                window.location.href = "indexhome.html";
            }

            function goPayment() {
                window.location.href = "payment.html";
            }
        </script>

        <!-- LEFT ARROW → GO TO HOME -
        <button class="arrow-btn " onclick="goHome()">
            ◀
        </button>---->

        <!-- RIGHT ARROW → GO TO PAYMENT -
        <button class="arrow-btn" onclick="goPayment()">
            ▶
        </button>--->

    </div>

    <script>
        function goHome() {
            window.location.href = "indexhome.html";
        }

        function goPayment() {
            window.location.href = "payment.html";
        }
    </script>

</body>

</html>
