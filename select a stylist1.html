<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Salon</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Epilogue;
        }

        body {
            background: #472430;
            padding: 20px;
        }

        /* NAVBAR WRAPPER */
        .nav-wrapper {
            max-width: 1600px;
            margin: 20px auto;
            background: #2b1720;
            border: 2px solid #E8306E;
            border-radius: 15px;
            padding: 10px 20px;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        /* LOGO */
        .logo {
            color: #ff2f7a;
            font-weight: bold;
            font-size: 1.8rem;
        }

        /* MENU LINKS */
        .menu {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: xx-large;
        }



        /* HAMBURGER */
        .hamburger {
            display: none;
            font-size: 32px;
            cursor: pointer;
            color: white;
        }

        #menu-toggle {
            display: none;
        }

        /* MOBILE MENU */
        @media (max-width: 768px) {

            .menu {
                display: none;
                flex-direction: column;
                background: #2b1720;
                position: absolute;
                top: 90px;
                right: 20px;
                padding: 20px;
                border-radius: 10px;
                border: 2px solid #E8306E;
                gap: 20px;
            }

            #menu-toggle:checked~.menu {
                display: flex;
            }

            .hamburger {
                display: block;
            }
        }
    </style>
</head>

<body>

    <div class="nav-wrapper">
        <div class="navbar">

            <div class="logo">💇 Luxe Salon</div>

            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="hamburger">☰</label>

            <div class="menu">
                <a href="#">Home</a>
                <a href="#">Services</a>
                <a href="#">Membership</a>

            </div>
            <img src="" alt="">
            <img src="image.jpg" width="200" alt="description">

        </div>
    </div>

</body>

</html>
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Stylist</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #1b0f16;
            font-family: Epilogue;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            text-align: left;
        }

        .sub {
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .stylist-card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info {
            flex: 1;
        }

        .stylist-img {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            object-fit: cover;
        }

        .select-btn {
            background: #E8306E;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;

        }

        .continue-btn {
            background: #ff2f7a;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;

        }

        .btn-right {
            text-align: right;
        }


        /* MEDIA QUERY */
        @media (max-width: 768px) {

            .stylist-card {
                flex-direction: column;
                text-align: center;
            }

            .stylist-img {
                width: 150px;
                height: 150px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Select a Stylist</h1>
        <p class="sub">Choose a stylist that best fits your needs.</p>

        <div class="stylist-card">


            <div class="info">
                <h2>Olivia Carter</h2>
                <p>Specialty: Hair Styling</p>
                <button class="select-btn">Select</button>
            </div>
            <img src="stylist1.jpg" class="stylist-img">
        </div>
        <div class="stylist-card">


            <div class="info">
                <h2>Olivia Carter</h2>
                <p>Specialty: Hair Styling</p>
                <button class="select-btn">Select</button>
            </div>
            <img src="stylist1.jpg" class="stylist-img">

        </div>
        <div class="stylist-card">


            <div class="info">
                <h2>Olivia Carter</h2>
                <p>Specialty: Hair Styling</p>
                <button class="select-btn">Select</button>
            </div>
            <img src="stylist1.jpg" class="stylist-img">
        </div>
        <div class="btn-right">
            <button class="continue-btn" onclick="goToPayment()">Continue with Selected Stylist</button>
        </div>


    </div>

    <script>
        function goToPayment() {
            window.location.href = "payment.html";
        }
    </script>

</body>

</html>
